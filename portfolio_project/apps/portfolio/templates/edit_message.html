{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Message — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Exo+2:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --bg-void: #050508;
      --bg-deep: #0a0a14;
      --bg-card: rgba(15,15,35,0.95);
      --cyan: #00e5ff;
      --cyan-dim: rgba(0,229,255,0.10);
      --cyan-glow: rgba(0,229,255,0.35);
      --green: #39ff14;
      --orange: #ff6b35;
      --red: #ff4757;
      --text-hi: #f0f4ff;
      --text-mid: #8892b0;
      --text-lo: #4a5568;
      --border: rgba(0,229,255,0.14);
      --font-display: 'Orbitron', monospace;
      --font-body: 'Exo 2', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg-void);
      color: var(--text-hi);
      font-family: var(--font-body);
      min-height: 100vh;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,229,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.025) 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── TOPBAR ── */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(5,5,8,0.92);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .topbar-brand {
      font-family: var(--font-display);
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--text-hi);
      display: flex; align-items: center; gap: 0.8rem;
    }
    .topbar-brand i { color: var(--cyan); }
    .btn-back {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.45rem 1rem;
      background: transparent;
      color: var(--text-mid);
      border: 1px solid var(--border);
      border-radius: 3px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.25s ease;
      display: inline-flex; align-items: center; gap: 0.4rem;
    }
    .btn-back:hover {
      border-color: var(--cyan);
      color: var(--cyan);
    }

    /* ── MAIN ── */
    .main {
      position: relative; z-index: 1;
      max-width: 720px;
      margin: 0 auto;
      padding: 3rem 2rem 5rem;
    }

    .page-eyebrow {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.28em;
      color: var(--cyan);
      text-transform: uppercase;
      margin-bottom: 0.4rem;
    }
    .page-title {
      font-family: var(--font-display);
      font-size: 1.8rem;
      font-weight: 900;
      letter-spacing: 0.06em;
      margin-bottom: 0.4rem;
    }
    .page-title .accent { color: var(--cyan); text-shadow: 0 0 20px var(--cyan-glow); }
    .page-meta {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--text-lo);
      letter-spacing: 0.08em;
      margin-bottom: 2.5rem;
    }

    /* ── FORM CARD ── */
    .form-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 2.5rem;
      backdrop-filter: blur(16px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .form-card:hover {
      border-color: rgba(0,229,255,0.22);
      box-shadow: 0 25px 80px rgba(0,0,0,0.5);
    }

    .form-group { margin-bottom: 1.4rem; }
    .form-label {
      display: block;
      font-family: var(--font-mono);
      font-size: 0.66rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-lo);
      margin-bottom: 0.45rem;
    }
    .form-label i { color: var(--cyan); margin-right: 0.4rem; }
    .form-label .required { color: var(--orange); margin-left: 0.2rem; }

    .form-control {
      width: 100%;
      background: rgba(0,229,255,0.03);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-hi);
      font-family: var(--font-body);
      font-size: 0.95rem;
      padding: 0.8rem 1rem;
      outline: none;
      transition: border-color 0.25s, box-shadow 0.25s;
    }
    .form-control:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 0 3px var(--cyan-dim);
    }
    .form-control::placeholder { color: var(--text-lo); }
    textarea.form-control { resize: vertical; min-height: 150px; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    @media (max-width: 560px) { .form-row { grid-template-columns: 1fr; } }

    /* ── DIVIDER ── */
    .divider {
      height: 1px;
      background: linear-gradient(to right, var(--border), transparent);
      margin: 1.8rem 0;
    }

    /* ── ACTIONS ── */
    .form-actions {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
      align-items: center;
    }
    .btn-save {
      font-family: var(--font-display);
      font-size: 0.76rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.85rem 2rem;
      background: var(--cyan);
      color: var(--bg-void);
      border: none;
      border-radius: 3px;
      cursor: pointer;
      font-weight: 700;
      box-shadow: 0 0 20px var(--cyan-glow);
      transition: all 0.3s ease;
      display: inline-flex; align-items: center; gap: 0.5rem;
    }
    .btn-save:hover {
      box-shadow: 0 0 40px var(--cyan-glow);
      transform: translateY(-2px);
    }
    .btn-cancel {
      font-family: var(--font-display);
      font-size: 0.76rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.85rem 1.8rem;
      background: transparent;
      color: var(--text-mid);
      border: 1px solid var(--border);
      border-radius: 3px;
      text-decoration: none;
      transition: all 0.25s ease;
      display: inline-flex; align-items: center; gap: 0.5rem;
    }
    .btn-cancel:hover {
      border-color: var(--cyan);
      color: var(--cyan);
    }

    /* Original timestamp note */
    .meta-note {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      color: var(--text-lo);
      letter-spacing: 0.06em;
      margin-left: auto;
    }
  </style>
</head>
<body>

<!-- ── TOPBAR ── -->
<nav class="topbar">
  <div class="topbar-brand">
    <i class="fas fa-terminal"></i>
    ADMIN PANEL
  </div>
  <a href="{% url 'dashboard' %}" class="btn-back">
    <i class="fas fa-arrow-left"></i> Dashboard
  </a>
</nav>

<!-- ── MAIN ── -->
<main class="main">
  <p class="page-eyebrow">Contact Messages / Edit</p>
  <h1 class="page-title">Edit <span class="accent">Message</span></h1>
  <p class="page-meta">
    Submitted by {{ message.name }} &nbsp;&bull;&nbsp; {{ message.submitted_at|date:"d M Y, H:i" }}
  </p>

  <div class="form-card">
    <form method="post" action="{% url 'edit_message' message.pk %}">
      {% csrf_token %}

      <div class="form-row">
        <div class="form-group">
          <label for="edit_name" class="form-label">
            <i class="fas fa-user"></i>Full Name <span class="required">*</span>
          </label>
          <input
            type="text" id="edit_name" name="name"
            class="form-control"
            value="{{ message.name }}"
            placeholder="Full name"
            required
          >
        </div>
        <div class="form-group">
          <label for="edit_email" class="form-label">
            <i class="fas fa-envelope"></i>Email Address <span class="required">*</span>
          </label>
          <input
            type="email" id="edit_email" name="email"
            class="form-control"
            value="{{ message.email }}"
            placeholder="Email address"
            required
          >
        </div>
      </div>

      <div class="form-group">
        <label for="edit_subject" class="form-label">
          <i class="fas fa-tag"></i>Subject
        </label>
        <input
          type="text" id="edit_subject" name="subject"
          class="form-control"
          value="{{ message.subject }}"
          placeholder="Subject (optional)"
        >
      </div>

      <div class="form-group">
        <label for="edit_message" class="form-label">
          <i class="fas fa-comment-dots"></i>Message <span class="required">*</span>
        </label>
        <textarea
          id="edit_message" name="message"
          class="form-control"
          placeholder="Message content"
          required
        >{{ message.message }}</textarea>
      </div>

      <div class="divider"></div>

      <div class="form-actions">
        <button type="submit" class="btn-save">
          <i class="fas fa-save"></i> Save Changes
        </button>
        <a href="{% url 'dashboard' %}" class="btn-cancel">
          <i class="fas fa-times"></i> Cancel
        </a>
        <span class="meta-note">ID #{{ message.pk }}</span>
      </div>
    </form>
  </div>
</main>

</body>
</html>
